const getFallbackPrice = (ticker) => FALLBACK_PRICES[ticker?.toUpperCase()] || 100;

async function fetchLivePrice(ticker) {
  const t = ticker.toUpperCase();
  // Try Yahoo Finance via a CORS-friendly proxy
  try {
    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${t}?interval=1d&range=1d`;
    const proxied = `https://corsproxy.io/?url=${encodeURIComponent(url)}`;
    const res = await fetch(proxied);
    if (!res.ok) throw new Error('yahoo bad');
    const data = await res.json();
    const r = data?.chart?.result?.[0];
    const price = r?.meta?.regularMarketPrice;
    const prevClose = r?.meta?.chartPreviousClose || r?.meta?.previousClose;
    if (typeof price === 'number') {
      const change = prevClose ? price - prevClose : 0;
      const changePct = prevClose ? (change / prevClose) * 100 : 0;
      return { price, name: r?.meta?.symbol || t, change, changePct, live: true };
    }
    throw new Error('no price');
  } catch (e) {
    return { price: getFallbackPrice(t), name: t, change: 0, changePct: 0, live: false };
  }
}

// Fetch USD/GBP rate, fallback ~0.79 (approx Apr 2026 level)
async function fetchFxRate(base, quote) {
  if (base === quote) return 1;
  try {
    const res = await fetch(`https://api.frankfurter.dev/v1/latest?base=${base}&symbols=${quote}`);
    if (!res.ok) throw new Error('bad');
    const data = await res.json();
    return data?.rates?.[quote] || (base === 'USD' && quote === 'GBP' ? 0.79 : 1 / 0.79);
  } catch {
    return base === 'USD' && quote === 'GBP' ? 0.79 : 1 / 0.79;
  }
}

function PortfolioTerminal() {
  const [tab, setTab] = useState('portfolio');

  const [loaded, setLoaded] = useState(false);
  const [now, setNow] = useState(new Date());
  const [refreshing, setRefreshing] = useState(false);
  const [currency, setCurrency] = useState('USD');
  const [fxRate, setFxRate] = useState(1); // USD -> currency

  useEffect(() => {
    fetchFxRate('USD', currency).then(setFxRate);
  }, [currency]);

  useEffect(() => {
    const t = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(t);
  }, []);

  useEffect(() => {
    (async () => {
      try { const t = await window.storage.get('pt:transactions'); if (t) setTransactions(JSON.parse(t.value)); } catch (e) {}
      try { const b = await window.storage.get('pt:benchmark'); if (b) setBenchmarkHistory(JSON.parse(b.value)); } catch (e) {}
      try { const c = await window.storage.get('pt:currency'); if (c) setCurrency(c.value); } catch (e) {}
      setLoaded(true);
    })();
  }, []);

  useEffect(() => {
    if (!loaded) return;
    window.storage.set('pt:transactions', JSON.stringify(transactions)).catch(() => {});
  }, [transactions, loaded]);

  useEffect(() => {
    if (!loaded) return;
    window.storage.set('pt:benchmark', JSON.stringify(benchmarkHistory)).catch(() => {});
  }, [benchmarkHistory, loaded]);

  useEffect(() => {
    if (!loaded) return;
    window.storage.set('pt:currency', currency).catch(() => {});

  const { positions, cash, realizedPnl } = useMemo(() => {
    const lots = {};
    let cashBal = 0;
    let realized = 0;
    for (const tx of [...transactions].sort((a, b) => a.ts - b.ts)) {
      if (tx.type === 'DEPOSIT') cashBal += tx.amount;
      else if (tx.type === 'WITHDRAW') cashBal -= tx.amount;
      else if (tx.type === 'BUY') {
        if (!lots[tx.ticker]) lots[tx.ticker] = [];
        lots[tx.ticker].push({ shares: tx.shares, price: tx.price });
        cashBal -= tx.shares * tx.price;
      } else if (tx.type === 'SELL') {
        let remaining = tx.shares;
        const queue = lots[tx.ticker] || [];
        while (remaining > 0 && queue.length > 0) {
          const lot = queue[0];
          const take = Math.min(lot.shares, remaining);
          realized += (tx.price - lot.price) * take;
          lot.shares -= take;
          remaining -= take;
          if (lot.shares <= 0.0000001) queue.shift();
        }
        cashBal += tx.shares * tx.price;
      }
    }
    const positions = Object.entries(lots).map(([ticker, queue]) => {
      const shares = queue.reduce((s, l) => s + l.shares, 0);
      if (shares <= 0.0000001) return null;
      const cost = queue.reduce((s, l) => s + l.shares * l.price, 0);
      return { ticker, shares, avgCost: cost / shares, cost };
    }).filter(Boolean);
    return { positions, cash: cashBal, realizedPnl: realized };
  }, [transactions]);

  const refreshQuotes = useCallback(async () => {
    setRefreshing(true);
    const tickers = new Set(positions.map(p => p.ticker));
    tickers.add('SPY');
    const updates = {};
    await Promise.all([...tickers].map(async (t) => {
      const q = await fetchLivePrice(t);
      updates[t] = { ...q, ts: Date.now() };
    }));
    setQuotes(prev => ({ ...prev, ...updates }));
    setRefreshing(false);
    const portValue = positions.reduce((s, p) => s + (updates[p.ticker]?.price || 0) * p.shares, 0) + cash;
    const spyPrice = updates.SPY?.price || 0;
    if (portValue > 0 && spyPrice > 0) {
      setBenchmarkHistory(prev => {
        const last = prev[prev.length - 1];
        if (last && Date.now() - last.ts < 30000) return prev;
        return [...prev, { ts: Date.now(), portfolio: portValue, spy: spyPrice }].slice(-500);
      });
    }
  }, [positions, cash]);

  useEffect(() => {
    if (!loaded) return;
    refreshQuotes();
    const i = setInterval(refreshQuotes, 60000);
    return () => clearInterval(i);
  }, [loaded, positions.length]);

  const enriched = useMemo(() => positions.map(p => {
    const q = quotes[p.ticker];
    const last = q?.price || getFallbackPrice(p.ticker);
    const value = last * p.shares;
    const pnl = value - p.cost;
    const pnlPct = p.cost > 0 ? (pnl / p.cost) * 100 : 0;
    return { ...p, last, value, pnl, pnlPct, change: q?.change || 0, changePct: q?.changePct || 0, live: q?.live || false };
  }), [positions, quotes]);

  const totalValue = enriched.reduce((s, p) => s + p.value, 0);
  const totalCost = enriched.reduce((s, p) => s + p.cost, 0);
  const unrealizedPnl = totalValue - totalCost;

  const grandTotal = totalValue + cash;
  const dayChange = enriched.reduce((s, p) => s + (p.change * p.shares), 0);

    const shares = parseFloat(sharesStr);

    // Fetch live prices for all tickers in the profile in parallel
    const tickers = profile.weights.filter(w => w.ticker !== 'CASH').map(w => w.ticker);
    const priceMap = {};
    await Promise.all(tickers.map(async t => {
      const q = await fetchLivePrice(t);
      priceMap[t] = q.price;
    }));

    const now = Date.now();
    const newTxs = [];
    // Single deposit (in USD terms internally — we store everything in USD to stay consistent with prices)
    newTxs.push({ type: 'DEPOSIT', amount: amountUsd, ts: now, id: (crypto.randomUUID?.() || String(Math.random())) });

    // One BUY per non-cash slice. Fractional shares (4 decimals).
    let ts = now + 1;
    for (const w of profile.weights) {
      if (w.ticker === 'CASH') continue;
      const slice = amountUsd * (w.weight / 100);
      const price = priceMap[w.ticker] || getFallbackPrice(w.ticker);
      const shares = Math.round((slice / price) * 10000) / 10000;
      if (shares > 0) {
        newTxs.push({ type: 'BUY', ticker: w.ticker, shares, price, ts: ts++, id: (crypto.randomUUID?.() || String(Math.random() + ts)) });

function RiskView({ enriched, totalValue, benchmarkHistory, currency = 'USD', fxRate = 1 }) {
  const weightedBeta = totalValue > 0 ? enriched.reduce((s, p) => s + (BETA[p.ticker] ?? 1.0) * (p.value / totalValue), 0) : 0;
  const weightedVol = totalValue > 0 ? (() => {
    let variance = 0;
    for (let i = 0; i < enriched.length; i++) {
      const wi = enriched[i].value / totalValue;
      const vi = (VOL[enriched[i].ticker] ?? 25) / 100;
      for (let j = 0; j < enriched.length; j++) {
        const wj = enriched[j].value / totalValue;
        const vj = (VOL[enriched[j].ticker] ?? 25) / 100;
        const corr = i === j ? 1.0 : 0.6;
        variance += wi * wj * vi * vj * corr;
      }
    }
    return Math.sqrt(variance) * 100;
  })() : 0;

  const hhi = totalValue > 0 ? enriched.reduce((s, p) => s + Math.pow((p.value / totalValue) * 100, 2), 0) : 0;
  const maxWeight = totalValue > 0 && enriched.length > 0 ? Math.max(...enriched.map(p => (p.value / totalValue) * 100)) : 0;
  const top5Weight = totalValue > 0 ? [...enriched].sort((a, b) => b.value - a.value).slice(0, 5).reduce((s, p) => s + (p.value / totalValue) * 100, 0) : 0;
  const var95 = totalValue * (weightedVol / 100) * 1.645 / Math.sqrt(252);

  const chartData = useMemo(() => {
    if (benchmarkHistory.length < 1) return [];
    const first = benchmarkHistory[0];
    return benchmarkHistory.map(b => ({
      time: new Date(b.ts).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }),
      Portfolio: (b.portfolio / first.portfolio) * 100,
      SPY: (b.spy / first.spy) * 100,
    }));
  }, [benchmarkHistory]);

  const portfolioReturn = chartData.length >= 2 ? chartData[chartData.length - 1].Portfolio - 100 : 0;
  const spyReturn = chartData.length >= 2 ? chartData[chartData.length - 1].SPY - 100 : 0;
  const alpha = portfolioReturn - spyReturn;

  const contributors = [...enriched].sort((a, b) => b.pnl - a.pnl);
  const riskLabel = hhi > 3000 ? 'HIGH' : hhi > 1800 ? 'ELEVATED' : hhi > 1000 ? 'MODERATE' : 'DIVERSIFIED';
  const riskColor = hhi > 3000 ? S.red : hhi > 1800 ? S.amber : hhi > 1000 ? S.gold : S.green;

  if (enriched.length === 0) return <Panel title="RISK & BENCHMARK"><EmptyState /></Panel>;

  return (
    <div style={{ display: 'grid', gap: '16px' }}>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(170px, 1fr))', gap: '12px' }}>
        <Kpi label="PORTFOLIO BETA" value={weightedBeta.toFixed(2)} sub="vs S&P 500" accent={weightedBeta > 1.3 ? S.red : weightedBeta > 1.1 ? S.amber : S.green} />
        <Kpi label="EST. VOLATILITY" value={`${weightedVol.toFixed(1)}%`} sub="annualized" accent={weightedVol > 30 ? S.red : weightedVol > 20 ? S.amber : S.green} />
        <Kpi label="1-DAY VaR (95%)" value={`$${var95.toLocaleString('en-US', { maximumFractionDigits: 0 })}`} sub="parametric" accent={S.amber} />
        <Kpi label="CONCENTRATION" value={riskLabel} sub={`HHI ${hhi.toFixed(0)}`} accent={riskColor} />
        <Kpi label="TOP POSITION" value={`${maxWeight.toFixed(1)}%`} sub="single-name" accent={maxWeight > 20 ? S.red : maxWeight > 10 ? S.amber : S.green} />
        <Kpi label="TOP 5 WEIGHT" value={`${top5Weight.toFixed(1)}%`} />
      </div>

      <Panel title="PERFORMANCE vs S&P 500 (SPY)">
        {chartData.length < 2 ? (
          <div style={{ padding: '40px 20px', textAlign: 'center', color: S.textDim }}>
            <Activity size={28} color={S.textFaint} style={{ margin: '0 auto 12px' }} />
            <div>Benchmark tracking starts with your first refresh.</div>
            <div style={{ color: S.textFaint, marginTop: '6px' }}>Updates every 60s automatically.</div>
          </div>
        ) : (
          <>
            <div style={{ display: 'flex', gap: '24px', marginBottom: '12px', flexWrap: 'wrap' }}>
              <div><span style={{ color: S.textDim, fontSize: '10px', letterSpacing: '0.15em' }}>PORTFOLIO </span><span style={{ color: portfolioReturn >= 0 ? S.green : S.red, fontWeight: 600 }}>{portfolioReturn >= 0 ? '+' : ''}{portfolioReturn.toFixed(2)}%</span></div>
              <div><span style={{ color: S.textDim, fontSize: '10px', letterSpacing: '0.15em' }}>SPY </span><span style={{ color: spyReturn >= 0 ? S.green : S.red, fontWeight: 600 }}>{spyReturn >= 0 ? '+' : ''}{spyReturn.toFixed(2)}%</span></div>
              <div><span style={{ color: S.textDim, fontSize: '10px', letterSpacing: '0.15em' }}>ALPHA </span><span style={{ color: alpha >= 0 ? S.green : S.red, fontWeight: 600 }}>{alpha >= 0 ? '+' : ''}{alpha.toFixed(2)}%</span></div>
              <div><span style={{ color: S.textDim, fontSize: '10px', letterSpacing: '0.15em' }}>SNAPSHOTS </span><span style={{ color: S.text }}>{benchmarkHistory.length}</span></div>
            </div>
            <ResponsiveContainer width="100%" height={280}>
              <LineChart data={chartData}>
                <XAxis dataKey="time" stroke={S.textFaint} fontSize={10} />
                <YAxis stroke={S.textFaint} fontSize={10} domain={['auto', 'auto']} tickFormatter={v => `${v.toFixed(1)}`} />
                <Tooltip contentStyle={{ background: S.bgAlt, border: `1px solid ${S.borderHot}`, fontSize: '11px', fontFamily: S.mono }} formatter={v => `${v.toFixed(2)}`} />
                <ReferenceLine y={100} stroke={S.textFaint} strokeDasharray="2 4" />
                <Line type="monotone" dataKey="Portfolio" stroke={S.gold} strokeWidth={2} dot={false} />
                <Line type="monotone" dataKey="SPY" stroke={S.cyan} strokeWidth={2} dot={false} strokeDasharray="4 2" />
              </LineChart>
            </ResponsiveContainer>
          </>
        )}
      </Panel>

      <div style={{ display: 'grid', gridTemplateColumns: 'minmax(0, 1fr) minmax(0, 1fr)', gap: '16px' }}>
        <Panel title="POSITION RISK CONTRIBUTIONS">
          <div style={{ overflowX: 'auto' }}>
            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '11px' }}>
              <thead>
                <tr style={{ borderBottom: `1px solid ${S.border}`, color: S.textDim }}>
                  <th style={th('left')}>TICKER</th>
                  <th style={th('right')}>WT %</th>
                  <th style={th('right')}>BETA</th>
                  <th style={th('right')}>VOL %</th>
                  <th style={th('right')}>β·WT</th>
                </tr>
              </thead>
              <tbody>
                {[...enriched].sort((a, b) => b.value - a.value).map(p => {
                  const w = (p.value / totalValue) * 100;
                  const b = BETA[p.ticker] ?? 1.0;
                  const v = VOL[p.ticker] ?? 25;
                  return (
                    <tr key={p.ticker} style={{ borderBottom: `1px solid ${S.border}` }}>
                      <td style={td('left')}><span style={{ color: S.gold, fontWeight: 600 }}>{p.ticker}</span></td>
                      <td style={td('right')}>{w.toFixed(1)}%</td>
                      <td style={{ ...td('right'), color: b > 1.5 ? S.red : b > 1.0 ? S.amber : S.green }}>{b.toFixed(2)}</td>
                      <td style={{ ...td('right'), color: v > 40 ? S.red : v > 25 ? S.amber : S.green }}>{v}%</td>
                      <td style={td('right')}>{(b * w / 100).toFixed(3)}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </Panel>

        <Panel title="P&L CONTRIBUTORS">
          <div style={{ display: 'grid', gap: '6px' }}>
            {contributors.slice(0, 8).map(p => {
              const maxAbs = Math.max(...contributors.map(c => Math.abs(c.pnl)), 1);
              const pct = (Math.abs(p.pnl) / maxAbs) * 100;
              return (
                <div key={p.ticker} style={{ display: 'grid', gridTemplateColumns: '60px 1fr 100px', alignItems: 'center', gap: '8px', fontSize: '11px' }}>
                  <span style={{ color: S.gold, fontWeight: 600 }}>{p.ticker}</span>
                  <div style={{ height: '14px', background: S.panel2, position: 'relative' }}>
                    <div style={{ position: 'absolute', top: 0, [p.pnl >= 0 ? 'left' : 'right']: 0, width: `${pct}%`, height: '100%', background: p.pnl >= 0 ? S.green : S.red, opacity: 0.8 }} />
                  </div>
                  <span style={{ textAlign: 'right', color: p.pnl >= 0 ? S.green : S.red, fontWeight: 600 }}>
                    {p.pnl >= 0 ? '+' : ''}${p.pnl.toLocaleString('en-US', { maximumFractionDigits: 0 })}
                  </span>
                </div>
              );
            })}
          </div>
        </Panel>
      </div>

      <Panel title="RISK FLAGS">
        <div style={{ display: 'grid', gap: '8px' }}>
          {maxWeight > 25 && <RiskFlag level="high" msg={`Single-name concentration: ${maxWeight.toFixed(1)}% in one position. Consider trimming.`} />}
          {hhi > 3000 && <RiskFlag level="high" msg={`High concentration (HHI ${hhi.toFixed(0)}). Portfolio behaves like ${(10000 / hhi).toFixed(1)} effective names.`} />}
          {weightedBeta > 1.4 && <RiskFlag level="med" msg={`Portfolio beta of ${weightedBeta.toFixed(2)} — ${((weightedBeta - 1) * 100).toFixed(0)}% more market sensitivity than SPY.`} />}
          {weightedVol > 30 && <RiskFlag level="med" msg={`Estimated volatility ${weightedVol.toFixed(1)}% is high. 1-day 95% VaR ~$${var95.toLocaleString('en-US', { maximumFractionDigits: 0 })}.`} />}
          {enriched.length < 8 && enriched.length > 0 && <RiskFlag level="low" msg={`Only ${enriched.length} positions. Diversification plateaus around 15-20 uncorrelated names.`} />}
          {enriched.length >= 8 && hhi <= 1800 && weightedBeta <= 1.2 && <RiskFlag level="ok" msg="Portfolio looks reasonably diversified and not excessively levered." />}
        </div>
      </Panel>
    </div>
  );
}

function RiskFlag({ level, msg }) {
  const cfg = {
    high: { color: S.red, icon: AlertTriangle, label: 'HIGH' },
    med: { color: S.amber, icon: AlertTriangle, label: 'MED' },
    low: { color: S.gold, icon: Zap, label: 'INFO' },
    ok: { color: S.green, icon: Shield, label: 'OK' },
  }[level];
  const Icon = cfg.icon;
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: '12px', padding: '10px 12px', background: S.panel2, borderLeft: `2px solid ${cfg.color}` }}>
      <Icon size={14} color={cfg.color} />
      <span style={{ color: cfg.color, fontSize: '10px', fontWeight: 700, letterSpacing: '0.15em', minWidth: '36px' }}>{cfg.label}</span>
      <span style={{ color: S.text, fontSize: '11px' }}>{msg}</span>
    </div>
  );
}

function LedgerView({ transactions, removeTx, clearAll, cash, realizedPnl, currency = 'USD', fxRate = 1 }) {
  const [filter, setFilter] = useState('ALL');
  const sorted = [...transactions].sort((a, b) => b.ts - a.ts);
  const filtered = filter === 'ALL' ? sorted : sorted.filter(t => t.type === filter);

  const totalDeposits = transactions.filter(t => t.type === 'DEPOSIT').reduce((s, t) => s + t.amount, 0);
  const totalBuys = transactions.filter(t => t.type === 'BUY').reduce((s, t) => s + t.shares * t.price, 0);
  const totalSells = transactions.filter(t => t.type === 'SELL').reduce((s, t) => s + t.shares * t.price, 0);
  const actionColor = { BUY: S.green, SELL: S.red, DEPOSIT: S.cyan, WITHDRAW: S.amber };

  return (
    <div style={{ display: 'grid', gap: '16px' }}>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(160px, 1fr))', gap: '12px' }}>
        <Kpi label="TOTAL TXNS" value={transactions.length} />
        <Kpi label="DEPOSITS" value={`$${totalDeposits.toLocaleString('en-US', { maximumFractionDigits: 0 })}`} accent={S.cyan} />
        <Kpi label="DEPLOYED" value={`$${totalBuys.toLocaleString('en-US', { maximumFractionDigits: 0 })}`} />
        <Kpi label="PROCEEDS" value={`$${totalSells.toLocaleString('en-US', { maximumFractionDigits: 0 })}`} />
        <Kpi label="REALIZED P&L" value={`${realizedPnl >= 0 ? '+' : ''}$${realizedPnl.toLocaleString('en-US', { maximumFractionDigits: 0 })}`} accent={realizedPnl >= 0 ? S.green : S.red} />
        <Kpi label="CASH" value={`$${cash.toLocaleString('en-US', { maximumFractionDigits: 0 })}`} accent={S.gold} />
      </div>

      <Panel title="TRANSACTION LEDGER">
        <div style={{ display: 'flex', gap: '4px', marginBottom: '12px', flexWrap: 'wrap' }}>
          {['ALL', 'BUY', 'SELL', 'DEPOSIT', 'WITHDRAW'].map(f => (
            <button key={f} onClick={() => setFilter(f)} style={{
              padding: '6px 12px', fontFamily: S.mono, fontSize: '10px', letterSpacing: '0.15em', cursor: 'pointer',
              background: filter === f ? S.panel2 : 'transparent',
              color: filter === f ? S.gold : S.textDim,
              border: `1px solid ${filter === f ? S.gold : S.border}`, fontWeight: 600,
            }}>{f}</button>
          ))}
          <div style={{ flex: 1 }} />
          {transactions.length > 0 && (
            <button onClick={clearAll} style={{ ...btnGhost, color: S.red, borderColor: S.red }}>
              <Trash2 size={11} /> CLEAR ALL

        {filtered.length === 0 ? (
          <div style={{ padding: '40px 20px', textAlign: 'center', color: S.textDim, fontSize: '12px' }}>
            {transactions.length === 0 ? 'No transactions yet. Go to Portfolio and add one.' : `No ${filter} transactions.`}
          </div>
        ) : (
          <div style={{ overflowX: 'auto' }}>
            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '11px' }}>
              <thead>
                <tr style={{ borderBottom: `1px solid ${S.border}`, color: S.textDim }}>
                  <th style={th('left')}>TIMESTAMP</th>
                  <th style={th('left')}>TYPE</th>
                  <th style={th('left')}>TICKER</th>
                  <th style={th('right')}>SHARES</th>
                  <th style={th('right')}>PRICE</th>
                  <th style={th('right')}>VALUE</th>
                  <th style={th('right')}></th>

              <tbody>

                  const value = tx.type === 'BUY' || tx.type === 'SELL' ? tx.shares * tx.price : tx.amount;
                  return (
                    <tr key={tx.id} style={{ borderBottom: `1px solid ${S.border}` }}>

                      <td style={td('left')}>

                      </td>

                      <td style={td('right')}>{tx.shares ? tx.shares.toLocaleString(undefined, { maximumFractionDigits: 4 }) : '—'}</td>
                      <td style={td('right')}>{tx.price ? `$${tx.price.toFixed(2)}` : '—'}</td>

        )}

              {mgr.topHoldings.map(t => (
                <button key={t} onClick={() => quickBuy(t)} style={{
                  padding: '6px 12px', background: S.panel2, border: `1px solid ${S.border}`,
                  fontSize: '11px', color: S.gold, fontWeight: 600, cursor: 'pointer', fontFamily: S.mono,
                }}>{t}</button>
              ))}

    </div>
  );
}

function StarterView({ deployAllocation, currency, fxRate, hasPortfolio, clearAll }) {
  const [selected, setSelected] = useState('balanced');
  const [amount, setAmount] = useState(5000);
  const [livePrices, setLivePrices] = useState({});
  const [loading, setLoading] = useState(false);
  const [deploying, setDeploying] = useState(false);

  const profile = PROFILES.find(p => p.id === selected);
  const sym = CURRENCIES[currency]?.symbol || '$';

  // Fetch live prices when profile changes
  useEffect(() => {
    let cancelled = false;
    setLoading(true);
    const tickers = profile.weights.filter(w => w.ticker !== 'CASH').map(w => w.ticker);
    Promise.all(tickers.map(async t => {
      const q = await fetchLivePrice(t);
      return [t, q];
    })).then(results => {
      if (cancelled) return;
      const map = {};
      results.forEach(([t, q]) => { map[t] = q; });
      setLivePrices(map);
      setLoading(false);
    });
    return () => { cancelled = true; };
  }, [selected]);

  // Computed slices in selected currency
  const slices = profile.weights.map(w => {
    const amountCcy = amount * (w.weight / 100);
    const amountUsd = amountCcy / fxRate;
    const q = livePrices[w.ticker];
    const priceUsd = q?.price || (w.ticker === 'CASH' ? 1 : getFallbackPrice(w.ticker));
    const shares = w.ticker === 'CASH' ? 0 : Math.round((amountUsd / priceUsd) * 10000) / 10000;
    const live = q?.live || false;
    return { ...w, amountCcy, amountUsd, priceUsd, shares, live };
  });

  const handleDeploy = async () => {
    if (hasPortfolio) {
      const ok = confirm(`You already have transactions. Deploying will ADD to your existing portfolio.\n\nTo start fresh, cancel and use "CLEAR ALL" in the Ledger first.\n\nContinue and add?`);
      if (!ok) return;
    }
    setDeploying(true);
    await deployAllocation(profile, amount, currency, fxRate);
    setDeploying(false);
  };

  return (
    <div style={{ display: 'grid', gap: '16px' }}>
      {/* Hero / disclaimer */}
      <div style={{
        padding: '16px 20px',
        background: `linear-gradient(90deg, ${S.panel} 0%, ${S.bgAlt} 100%)`,
        border: `1px solid ${S.borderHot}`,
        borderLeft: `3px solid ${S.gold}`,
      }}>
        <div style={{ fontSize: '11px', color: S.gold, letterSpacing: '0.2em', marginBottom: '6px' }}>
          STARTER ALLOCATION
        </div>
        <div style={{ fontSize: '12px', color: S.text, lineHeight: 1.7, marginBottom: '8px' }}>
          Pick a profile, enter an amount, review the slices, then deploy. One DEPOSIT plus one BUY per line are added to your ledger with full audit trail. Fractional shares to 4 decimals.
        </div>
        <div style={{ fontSize: '11px', color: S.amber, lineHeight: 1.6 }}>
          Educational tool — NOT investment advice. At small sizes, a UK tax wrapper (ISA) and fees matter more than the specific allocation. A simple global tracker (VWRL, FWRG) may beat any of these after costs. DYOR.
        </div>
      </div>

      {/* Profile picker */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))', gap: '12px' }}>
        {PROFILES.map(p => {
          const active = selected === p.id;
          return (
            <div key={p.id} onClick={() => setSelected(p.id)} style={{
              padding: '16px',
              background: active ? S.panel2 : S.panel,
              border: `1px solid ${active ? p.color : S.border}`,
              borderLeft: `3px solid ${p.color}`,
              cursor: 'pointer',
              transition: 'all 0.15s',
            }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: '6px' }}>
                <div style={{ fontFamily: S.display, fontSize: '15px', fontWeight: 600, color: S.text }}>{p.name}</div>
                <div style={{ fontSize: '10px', color: p.color, letterSpacing: '0.1em', fontWeight: 600 }}>β {p.targetBeta}</div>
              </div>
              <div style={{ fontSize: '11px', color: p.color, marginBottom: '8px', letterSpacing: '0.05em' }}>{p.subtitle}</div>
              <div style={{ fontSize: '11px', color: S.textDim, lineHeight: 1.6 }}>{p.description}</div>
              {active && (
                <div style={{ marginTop: '10px', fontSize: '9px', color: S.gold, letterSpacing: '0.2em', fontWeight: 700 }}>● SELECTED</div>
              )}
            </div>
          );
        })}
      </div>

      {/* Amount input */}
      <Panel title="DEPLOY AMOUNT">
        <div style={{ display: 'flex', gap: '12px', alignItems: 'center', flexWrap: 'wrap' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
            <span style={{ color: S.textDim, fontSize: '11px' }}>Amount ({currency})</span>
            <div style={{ display: 'flex', alignItems: 'center', border: `1px solid ${S.border}`, background: S.bg }}>
              <span style={{ padding: '0 10px', color: S.gold, fontWeight: 600, fontSize: '14px' }}>{sym}</span>
              <input
                type="number"
                value={amount}
                onChange={e => setAmount(Math.max(0, parseFloat(e.target.value) || 0))}
                style={{ background: 'transparent', border: 'none', color: S.text, padding: '10px 12px 10px 0', fontFamily: S.mono, fontSize: '14px', width: '140px', outline: 'none', fontWeight: 600 }}
              />
            </div>
          </div>
          <div style={{ display: 'flex', gap: '4px', flexWrap: 'wrap' }}>
            {[1000, 2500, 5000, 10000, 25000].map(v => (
              <button key={v} onClick={() => setAmount(v)} style={{
                padding: '8px 12px', background: amount === v ? S.panel2 : 'transparent',
                color: amount === v ? S.gold : S.textDim,
                border: `1px solid ${amount === v ? S.gold : S.border}`,
                fontFamily: S.mono, fontSize: '10px', fontWeight: 600, letterSpacing: '0.1em', cursor: 'pointer',
              }}>{sym}{v.toLocaleString()}</button>
            ))}
          </div>
          <div style={{ flex: 1 }} />
          <div style={{ fontSize: '10px', color: S.textFaint, letterSpacing: '0.1em' }}>
            USD EQUIVALENT: <span style={{ color: S.textDim }}>${(amount / fxRate).toLocaleString('en-US', { maximumFractionDigits: 0 })}</span>
          </div>
        </div>
      </Panel>

      {/* Preview table */}
      <Panel title={`PREVIEW — ${profile.name.toUpperCase()} @ ${sym}${amount.toLocaleString()}`}>
        {loading ? (
          <div style={{ padding: '40px', textAlign: 'center', color: S.textDim, fontSize: '11px' }}>
            <RefreshCw size={24} color={S.textFaint} style={{ animation: 'spin 1s linear infinite', margin: '0 auto 10px' }} />
            <div>FETCHING LIVE PRICES…</div>
          </div>
        ) : (
          <div style={{ overflowX: 'auto' }}>
            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '11px' }}>
              <thead>
                <tr style={{ borderBottom: `1px solid ${S.border}`, color: S.textDim }}>
                  <th style={th('left')}>TICKER</th>
                  <th style={th('left')}>EXPOSURE</th>
                  <th style={th('right')}>TARGET %</th>
                  <th style={th('right')}>{currency} ALLOC</th>
                  <th style={th('right')}>PRICE (USD)</th>
                  <th style={th('right')}>SHARES</th>
                </tr>
              </thead>
              <tbody>
                {slices.map(s => (
                  <tr key={s.ticker} style={{ borderBottom: `1px solid ${S.border}` }}>
                    <td style={td('left')}>
                      <span style={{ color: s.ticker === 'CASH' ? S.cyan : S.gold, fontWeight: 600 }}>{s.ticker}</span>
                      {s.ticker !== 'CASH' && !s.live && <span style={{ marginLeft: '6px', fontSize: '8px', color: S.textFaint, letterSpacing: '0.1em' }}>FB</span>}
                    </td>
                    <td style={{ ...td('left'), color: S.textDim }}>{s.note}</td>
                    <td style={td('right')}>{s.weight}%</td>
                    <td style={{ ...td('right'), color: S.text, fontWeight: 600 }}>{fmtMoney(s.amountCcy, currency, 2)}</td>
                    <td style={td('right')}>{s.ticker === 'CASH' ? '—' : `$${s.priceUsd.toFixed(2)}`}</td>
                    <td style={{ ...td('right'), color: s.ticker === 'CASH' ? S.textFaint : S.text }}>
                      {s.ticker === 'CASH' ? 'Held as cash' : s.shares.toLocaleString(undefined, { maximumFractionDigits: 4 })}
                    </td>
                  </tr>
                ))}
                <tr style={{ borderTop: `2px solid ${S.borderHot}`, background: S.panel2 }}>
                  <td style={{ ...td('left'), fontWeight: 700, color: S.gold }}>TOTAL</td>
                  <td style={td('left')}></td>
                  <td style={{ ...td('right'), fontWeight: 700 }}>100%</td>
                  <td style={{ ...td('right'), fontWeight: 700, color: S.gold }}>{fmtMoney(amount, currency, 2)}</td>
                  <td style={td('right')}></td>
                  <td style={td('right')}></td>
                </tr>
              </tbody>
            </table>
          </div>
        )}

        <div style={{ marginTop: '16px', display: 'flex', gap: '10px', flexWrap: 'wrap', alignItems: 'center' }}>
          <button onClick={handleDeploy} disabled={loading || deploying || amount <= 0} style={{
            background: (loading || deploying || amount <= 0) ? S.panel2 : profile.color,
            color: (loading || deploying || amount <= 0) ? S.textFaint : '#0a0e14',
            border: 'none', padding: '10px 20px', fontFamily: S.mono, fontSize: '11px',
            fontWeight: 700, letterSpacing: '0.15em', cursor: (loading || deploying || amount <= 0) ? 'wait' : 'pointer',
            display: 'inline-flex', alignItems: 'center', gap: '8px',
          }}>
            <Rocket size={13} />
            {deploying ? 'DEPLOYING…' : `DEPLOY ${fmtMoney(amount, currency)} → ${profile.name.toUpperCase()}`}
          </button>
          {hasPortfolio && (
            <button onClick={clearAll} style={{
              background: 'transparent', color: S.red, border: `1px solid ${S.red}`,
              padding: '10px 14px', fontFamily: S.mono, fontSize: '10px', fontWeight: 600,
              letterSpacing: '0.15em', cursor: 'pointer', display: 'inline-flex', alignItems: 'center', gap: '6px',
            }}>
              <Trash2 size={11} /> CLEAR EXISTING FIRST
            </button>
          )}
          <div style={{ fontSize: '10px', color: S.textFaint, letterSpacing: '0.1em' }}>
            After deploy: jump to PORTFOLIO or LEDGER to review.
          </div>
        </div>
      </Panel>

      {/* Methodology */}
      <Panel title="HOW THIS WORKS">
        <div style={{ fontSize: '11px', color: S.textDim, lineHeight: 1.8 }}>
          <div style={{ color: S.text, fontWeight: 600, marginBottom: '8px' }}>What happens on deploy</div>
          <div>One DEPOSIT for the full amount (converted to USD internally — prices are in USD), then one BUY per ticker at the current live price with fractional shares. Everything shows up in your Ledger, timestamped, and feeds the Risk tab.</div>
          <div style={{ color: S.text, fontWeight: 600, marginTop: '14px', marginBottom: '8px' }}>Currency</div>
          <div>Switch currencies in the header. Positions are stored in USD, but AUM, P&L and this preview are rendered in your chosen currency at the latest FX rate (via Frankfurter API, with a ~0.79 USD/GBP fallback).</div>
          <div style={{ color: S.text, fontWeight: 600, marginTop: '14px', marginBottom: '8px' }}>Profile logic</div>
          <div>Weights are hardcoded — not optimized. They reflect the general shape of each style (all-weather / quality-core / thematic-growth) using the 2026 consensus themes and instruments from the IDEAS tab. Adjust manually after deploy if needed.</div>
        </div>
      </Panel>
    </div>
  );
}

function Kpi({ label, value, sub, accent }) {
  return (
    <div style={{ padding: '14px 16px', background: S.panel, border: `1px solid ${S.border}`, borderTop: accent ? `2px solid ${accent}` : `1px solid ${S.border}` }}>
      <div style={{ fontSize: '10px', color: S.textDim, letterSpacing: '0.2em', marginBottom: '6px' }}>{label}</div>
      <div style={{ fontSize: '18px', fontWeight: 600, color: accent || S.text, fontFamily: S.mono }}>{value}</div>
      {sub && <div style={{ fontSize: '10px', color: S.textDim, marginTop: '2px' }}>{sub}</div>}
    </div>
  );
}

function Panel({ title, children }) {
  return (
    <div style={{ background: S.panel, border: `1px solid ${S.border}` }}>
      <div style={{ padding: '10px 16px', borderBottom: `1px solid ${S.border}`, fontSize: '10px', color: S.textDim, letterSpacing: '0.25em', background: S.bgAlt, fontWeight: 600 }}>{title}</div>
      <div style={{ padding: '16px' }}>{children}</div>
    </div>
  );
}

function Field({ label, value, color }) {
  return (
    <div>
      <div style={{ fontSize: '10px', color: S.textDim, letterSpacing: '0.15em', marginBottom: '4px' }}>{label}</div>
      <div style={{ fontSize: '12px', color: color || S.text, fontWeight: 600 }}>{value}</div>
    </div>
  );
}

function EmptyState() {
  return (
    <div style={{ padding: '40px 20px', textAlign: 'center' }}>
      <Briefcase size={32} color={S.textFaint} style={{ margin: '0 auto 12px' }} />
      <div style={{ color: S.textDim, fontSize: '12px', marginBottom: '8px' }}>NO POSITIONS YET</div>
      <div style={{ color: S.textFaint, fontSize: '11px', lineHeight: 1.6, maxWidth: '400px', margin: '0 auto' }}>
        Hit NEW TRANSACTION to deposit cash and buy your first position. Or jump to SMART MONEY / IDEAS and click any BUY button.
      </div>
    </div>
  );
}

const th = (align) => ({ padding: '10px 8px', textAlign: align, fontSize: '10px', fontWeight: 600, letterSpacing: '0.15em', color: S.textDim });
const td = (align) => ({ padding: '10px 8px', textAlign: align, color: S.text, fontFamily: S.mono });
const inputStyle = (w) => ({ background: S.bg, border: `1px solid ${S.border}`, color: S.text, padding: '7px 10px', fontFamily: S.mono, fontSize: '11px', width: w, outline: 'none' });
const btnPrimary = { background: S.gold, color: '#0a0e14', border: 'none', padding: '7px 14px', fontFamily: S.mono, fontSize: '10px', fontWeight: 700, letterSpacing: '0.15em', cursor: 'pointer', display: 'inline-flex', alignItems: 'center', gap: '6px' };
const btnGhost = { background: 'transparent', color: S.textDim, border: `1px solid ${S.border}`, padding: '7px 12px', fontFamily: S.mono, fontSize: '10px', fontWeight: 600, letterSpacing: '0.15em', cursor: 'pointer', display: 'inline-flex', alignItems: 'center', gap: '6px' };
const btnMini = { background: 'transparent', color: S.gold, border: `1px solid ${S.gold}`, padding: '4px 10px', fontFamily: S.mono, fontSize: '9px', fontWeight: 700, letterSpacing: '0.1em', cursor: 'pointer' };


ReactDOM.createRoot(document.getElementById("root")).render(
  React.createElement(PortfolioTerminal)
);

</script>
